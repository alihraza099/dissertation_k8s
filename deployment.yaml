apiVersion: apps/v1
kind: Deployment
metadata:
  name: violence-detector
  labels:
    app: violence-detector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: violence-detector
  template:
    metadata:
      labels:
        app: violence-detector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: violence-detector
          image: alihraza/violence-detector:latest
          imagePullPolicy: Always
          ports:
            - name: streamlit
              containerPort: 8501
            - name: metrics
              containerPort: 8000
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: violence-detector
spec:
  type: LoadBalancer
  selector:
    app: violence-detector
  ports:
    - name: http
      port: 80
      targetPort: 8501
    - name: api
      port: 8000
      targetPort: 8000
